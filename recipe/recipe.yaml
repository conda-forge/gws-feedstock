context:
  version: "0.13.2"

package:
  name: gws
  version: ${{ version }}

source:
  url: https://github.com/googleworkspace/cli/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1807b2630d3f5876e3161e377c97c1f111a82d4923609ecb05a56820238c95df

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script: gws --help
  - package_contents:
      bin:
        - gws
      strict: true

about:
  homepage: https://github.com/googleworkspace/cli
  summary: Google Workspace CLI for Drive, Gmail, Calendar, Sheets, Docs, Chat, Admin, and more
  description: |
    Google Workspace CLI (gws) is a command-line tool for interacting with
    Google Workspace services including Drive, Gmail, Calendar, Sheets, Docs,
    Chat, Admin, and more. Its command surface is dynamically built from the
    Google Discovery Service. Includes AI agent skills and MCP server support.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/googleworkspace/cli

extra:
  recipe-maintainers:
    - pavelzw
